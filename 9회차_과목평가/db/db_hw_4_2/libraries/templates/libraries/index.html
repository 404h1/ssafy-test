<!-- libraries/templates/libraries/index.html -->
<!-- 책 전체 목록을 확인 할 수 있는 페이지를 제공한다. -->

{% extends 'base.html' %}

{% block content %}
  <h1>책 전체 목록</h1>
  <ul>
    {% for book in books %}
      <a href="{% url 'libraries:detail' book.pk %}">
        <li>제목 : {{ book.title }}</li>
      </a>
      <hr>
    {% endfor %}
  </ul>
{% endblock content %}
