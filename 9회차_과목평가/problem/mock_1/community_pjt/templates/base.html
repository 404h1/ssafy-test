<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 16px; }
    nav { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #ccc; margin-bottom: 16px; }
    nav a { text-decoration: none; color: #333; }
    nav form { margin: 0; }
  </style>
</head>
<body>
  <nav>
    <strong><a href="{% url 'articles:index' %}">Community</a></strong>
    <span style="flex:1;"></span>
    {% if request.user.is_authenticated %}
      <a href="{% url 'accounts:profile' request.user.username %}">{{ request.user.username }}</a>
      <form action="{% url 'accounts:logout' %}" method="POST">
        {% csrf_token %}
        <button type="submit">로그아웃</button>
      </form>
    {% else %}
      <a href="{% url 'accounts:login' %}">로그인</a>
      <a href="{% url 'accounts:signup' %}">회원가입</a>
    {% endif %}
  </nav>

  {% block content %}
  {% endblock %}
</body>
</html>
